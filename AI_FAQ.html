<!DOCTYPE html>
<html lang="zh-Hant"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>店家客服 FAQ 知識庫</title>
<style>
  :root{
    --red: #BF0000;
    --red-dark: #8f0000;
    --red-soft: #fdeceb;
    --ink: #1c1c1e;
    --ink-soft: #58585c;
    --line: #e6e3df;
    --bg: #f7f5f2;
    --card: #ffffff;
    --amber: #b9790a;
    --amber-soft: #fdf3e2;
    --mono: 'SF Mono', 'Consolas', monospace;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    font-family: -apple-system, "PingFang TC", "Noto Sans TC", "Microsoft JhengHei", sans-serif;
    background: var(--bg);
    color: var(--ink);
    line-height: 1.7;
    -webkit-font-smoothing: antialiased;
  }

  /* ===== Header ===== */
  .topbar{
    position: sticky;
    top: 0;
    z-index: 50;
    background: var(--ink);
    color: #fff;
    padding: 14px 24px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap: 16px;
    flex-wrap: wrap;
  }
  .brand{
    display:flex;
    align-items:center;
    gap:10px;
    font-weight:800;
    letter-spacing: 0.02em;
    font-size: 17px;
  }
  .brand .dot{
    width:9px;height:9px;border-radius:50%;
    background: var(--red);
    box-shadow: 0 0 0 3px rgba(191,0,0,0.25);
  }
  .brand small{
    font-weight:500;
    opacity:0.6;
    font-size:12px;
    margin-left:4px;
  }
  .topbar-actions{
    display:flex;
    align-items:center;
    gap:10px;
  }
  .btn{
    border:none;
    border-radius:8px;
    padding:8px 14px;
    font-size:13px;
    font-weight:600;
    cursor:pointer;
    transition: all .15s ease;
    font-family: inherit;
    white-space: nowrap;
  }
  .btn-ghost{
    background: rgba(255,255,255,0.08);
    color:#fff;
  }
  .btn-ghost:hover{ background: rgba(255,255,255,0.16); }
  .btn-edit-on{
    background: var(--red);
    color:#fff;
  }
  .btn-edit-on:hover{ background: var(--red-dark); }
  .btn-export{
    background: #1f9d55;
    color:#fff;
    display:none;
  }
  .btn-export:hover{ background:#188042; }
  .btn-add{
    background: var(--amber);
    color:#fff;
    display:none;
  }
  .btn-add:hover{ filter:brightness(0.92); }

  /* ===== Hero / search ===== */
  .hero{
    padding: 28px 24px 18px;
    max-width: 980px;
    margin: 0 auto;
  }
  .hero h1{
    font-size: 22px;
    margin: 0 0 4px;
    font-weight: 800;
  }
  .hero p.sub{
    margin:0 0 16px;
    color: var(--ink-soft);
    font-size: 14px;
  }
  .search-wrap{
    position: relative;
  }
  .search-wrap input{
    width:100%;
    padding: 13px 44px 13px 44px;
    border-radius: 12px;
    border: 1.5px solid var(--line);
    background: var(--card);
    font-size: 15px;
    font-family: inherit;
    color: var(--ink);
    outline: none;
    transition: border-color .15s ease, box-shadow .15s ease;
  }
  .search-wrap input:focus{
    border-color: var(--red);
    box-shadow: 0 0 0 3px rgba(191,0,0,0.12);
  }
  .search-wrap .icon{
    position:absolute;
    left:14px;
    top:50%;
    transform: translateY(-50%);
    width:18px;height:18px;
    opacity:0.45;
  }
  .search-count{
    font-size:12.5px;
    color: var(--ink-soft);
    margin-top:8px;
    padding-left:2px;
  }
  .search-count b{ color: var(--red); }

  /* ===== Category tabs ===== */
  .tabs{
    max-width: 980px;
    margin: 0 auto;
    padding: 4px 24px 0;
    display:flex;
    gap:8px;
    flex-wrap:wrap;
  }
  .tab{
    padding: 8px 16px;
    border-radius: 999px;
    border: 1.5px solid var(--line);
    background: var(--card);
    color: var(--ink-soft);
    font-size: 13.5px;
    font-weight:600;
    cursor:pointer;
    user-select:none;
    transition: all .15s ease;
    display:flex;
    align-items:center;
    gap:6px;
  }
  .tab:hover{ border-color:#c9c5bf; }
  .tab.active{
    background: var(--ink);
    color:#fff;
    border-color: var(--ink);
  }
  .tab .count{
    font-size:11px;
    opacity:0.65;
    font-weight:700;
  }

  /* ===== Main layout ===== */
  .main{
    max-width: 980px;
    margin: 0 auto;
    padding: 20px 24px 80px;
  }

  /* ===== Screenshot reference block ===== */
  .ref-block{
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 20px;
    margin-bottom: 28px;
  }
  .ref-block-header{
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom:14px;
  }
  .ref-block-header h2{
    font-size:15px;
    margin:0;
    font-weight:800;
  }
  .ref-block-header .tag-pill{
    background: var(--amber-soft);
    color: var(--amber);
    font-size:11px;
    font-weight:700;
    padding:3px 10px;
    border-radius:999px;
  }
  .ref-grid{
    display:grid;
    grid-template-columns: 1fr 1fr;
    gap:18px;
  }
  @media (max-width: 720px){
    .ref-grid{ grid-template-columns: 1fr; }
  }
  .ref-item h3{
    font-size:13.5px;
    margin:0 0 8px;
    color: var(--ink);
    font-weight:700;
  }
  .ref-item img{
    width:100%;
    border-radius:8px;
    border:1px solid var(--line);
    display:block;
    cursor: zoom-in;
  }
  .ref-item .caption{
    font-size:12px;
    color: var(--ink-soft);
    margin-top:6px;
  }

  /* ===== FAQ cards ===== */
  .category-section{ margin-bottom: 30px; }
  .category-title{
    font-size:13px;
    font-weight:800;
    color: var(--red);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin: 0 0 10px;
    padding-left:2px;
  }
  .card{
    background: var(--card);
    border:1px solid var(--line);
    border-radius: 12px;
    margin-bottom: 10px;
    overflow: hidden;
    transition: border-color .15s ease;
  }
  .card.open{ border-color:#d8d4cd; }
  .card-head{
    padding: 15px 18px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
    cursor:pointer;
    user-select:none;
  }
  .card-head:hover{ background: #fcfbfa; }
  .card-title{
    font-size: 14.5px;
    font-weight: 700;
    color: var(--ink);
    flex:1;
  }
  .card-meta{
    display:flex;
    align-items:center;
    gap:8px;
    flex-shrink:0;
  }
  .shot-badge{
    font-size:10.5px;
    font-weight:700;
    color: var(--amber);
    background: var(--amber-soft);
    padding:3px 8px;
    border-radius:999px;
  }
  .chevron{
    width:18px;height:18px;
    transition: transform .2s ease;
    opacity:0.4;
    flex-shrink:0;
  }
  .card.open .chevron{ transform: rotate(180deg); }
  .card-body{
    display:none;
    padding: 0 18px 18px;
  }
  .card.open .card-body{ display:block; }
  .card-content{
    font-size: 13.8px;
    color: var(--ink-soft);
    white-space: pre-wrap;
    line-height: 1.75;
    border-top: 1px solid var(--line);
    padding-top: 14px;
  }
  .card-content a{ color: var(--red); text-decoration: none; border-bottom: 1px solid rgba(191,0,0,0.3); }
  .card-content a:hover{ border-bottom-color: var(--red); }
  .card-tags{
    display:flex;
    flex-wrap:wrap;
    gap:6px;
    margin-top:12px;
  }
  .card-tag{
    font-size:11px;
    color: var(--ink-soft);
    background: var(--bg);
    border:1px solid var(--line);
    padding:3px 9px;
    border-radius:999px;
  }
  .card-screenshot-link{
    display:inline-flex;
    align-items:center;
    gap:6px;
    margin-top:14px;
    font-size:12.5px;
    font-weight:700;
    color: var(--amber);
    cursor:pointer;
    text-decoration:none;
  }
  .card-screenshot-link:hover{ text-decoration: underline; }

  .empty-state{
    text-align:center;
    padding: 60px 20px;
    color: var(--ink-soft);
  }
  .empty-state .icon{ font-size:36px; margin-bottom:10px; }

  /* ===== Edit mode ===== */
  body.edit-mode .card-head{ cursor: default; }
  body.edit-mode .card-title-input,
  body.edit-mode .card-content-input{
    width:100%;
    font-family: inherit;
    border:1.5px dashed #cfcac1;
    border-radius:8px;
    padding:8px 10px;
    background:#fffdf8;
    color: var(--ink);
  }
  body.edit-mode .card-title-input{
    font-size:14.5px;
    font-weight:700;
    margin-bottom: 0;
  }
  body.edit-mode .card-content-input{
    font-size:13.8px;
    line-height:1.7;
    resize: vertical;
    min-height: 100px;
    margin-top: 12px;
  }
  .edit-toolbar{
    display:none;
    gap:8px;
    margin-top: 12px;
    flex-wrap: wrap;
  }
  body.edit-mode .edit-toolbar{ display:flex; }
  .edit-toolbar button{
    border:none;
    border-radius:7px;
    padding:6px 12px;
    font-size:12px;
    font-weight:700;
    cursor:pointer;
    font-family: inherit;
  }
  .edit-toolbar .save-btn{ background:#1f9d55; color:#fff; }
  .edit-toolbar .delete-btn{ background:#fdeceb; color:var(--red); }
  .edit-toolbar .tags-btn{ background:var(--bg); color:var(--ink-soft); border:1px solid var(--line); }

  body.edit-mode .card-head{ background:#fffdf8; }
  body.edit-mode .card{ border-color:#ecd9a8; }

  .add-card-wrap{
    display:none;
    margin-top: 16px;
  }
  body.edit-mode .add-card-wrap{ display:block; }
  .add-card-btn{
    width:100%;
    padding:14px;
    border-radius:12px;
    border: 1.5px dashed #cfcac1;
    background: transparent;
    color: var(--ink-soft);
    font-weight:700;
    font-size:13.5px;
    cursor:pointer;
    font-family: inherit;
  }
  .add-card-btn:hover{ background:#fffdf8; border-color: var(--amber); color: var(--amber); }

  .edit-banner{
    display:none;
    background: var(--amber-soft);
    color: var(--amber);
    font-size:13px;
    font-weight:600;
    padding: 10px 24px;
    text-align:center;
  }
  body.edit-mode .edit-banner{ display:block; }

  /* ===== Lightbox ===== */
  .lightbox{
    display:none;
    position:fixed;
    inset:0;
    background: rgba(20,20,20,0.85);
    z-index: 100;
    align-items:center;
    justify-content:center;
    padding: 30px;
    cursor: zoom-out;
  }
  .lightbox.show{ display:flex; }
  .lightbox img{
    max-width: 100%;
    max-height: 100%;
    border-radius: 8px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }

  /* ===== New item modal ===== */
  .modal-overlay{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(20,20,20,0.5);
    z-index:90;
    align-items:center;
    justify-content:center;
    padding: 20px;
  }
  .modal-overlay.show{ display:flex; }
  .modal{
    background:#fff;
    border-radius:14px;
    padding:24px;
    max-width:480px;
    width:100%;
    max-height: 85vh;
    overflow-y: auto;
  }
  .modal h3{ margin:0 0 16px; font-size:16px; font-weight:800; }
  .modal label{
    display:block;
    font-size:12.5px;
    font-weight:700;
    color: var(--ink-soft);
    margin: 14px 0 6px;
  }
  .modal label:first-of-type{ margin-top:0; }
  .modal select, .modal input[type=text], .modal textarea{
    width:100%;
    padding:9px 11px;
    border-radius:8px;
    border:1.5px solid var(--line);
    font-family: inherit;
    font-size:13.5px;
    outline:none;
  }
  .modal select:focus, .modal input[type=text]:focus, .modal textarea:focus{
    border-color: var(--red);
  }
  .modal textarea{ min-height:120px; resize: vertical; }
  .modal-actions{
    display:flex;
    gap:10px;
    margin-top:20px;
  }
  .modal-actions button{
    flex:1;
    padding:11px;
    border-radius:9px;
    border:none;
    font-weight:700;
    font-size:13.5px;
    cursor:pointer;
    font-family: inherit;
  }
  .modal-actions .confirm{ background: var(--red); color:#fff; }
  .modal-actions .cancel{ background: var(--bg); color: var(--ink-soft); }

  footer{
    text-align:center;
    font-size:12px;
    color: var(--ink-soft);
    padding: 20px;
    opacity: 0.7;
  }

  @media (max-width: 600px){
    .topbar{ padding:12px 16px; }
    .brand small{ display:none; }
    .hero, .tabs, .main{ padding-left:16px; padding-right:16px; }
    .btn{ padding:7px 11px; font-size:12.5px; }
  }
</style>
</head>

    <div class="topbar-actions">
      <button class="btn btn-export" id="exportBtn" onclick="exportHtml()" style="display: none;">⬇ 匯出更新後的檔案</button>
      <button class="btn btn-add" id="addBtn" onclick="openAddModal()" style="display: none;">+ 新增問題</button>
      <button class="btn btn-ghost" id="editToggle" onclick="toggleEditMode()">✎ 開啟編輯模式</button>
    </div>
  </div>

  <div class="edit-banner">編輯模式已開啟：點擊任何問題即可修改文字，改完後別忘了按右上角「匯出更新後的檔案」下載新檔，再上傳取代舊檔給同事使用。</div>

  <div class="hero">

  <div class="tabs" id="tabs"></div>

        <option value="logistics">配送與售後客服</option>

      <input type="text" id="newTitle" placeholder="例如：如何申請退貨？">

      <textarea id="newContent" placeholder="請輸入詳細回覆內容…"></textarea>
      <label>標籤（用逗號分隔，選填）</label>
      <input type="text" id="newTags" placeholder="例如：退貨, 退款">
      <div class="modal-actions">
        <button class="cancel" onclick="closeAddModal()">取消</button>
        <button class="confirm" onclick="confirmAdd()">新增</button>
      </div>
    </div>

const CATEGORY_LABELS = {
  account: "帳號與後台操作",
  marketing: "行銷與廣告活動",
  finance: "財務與金流",
  logistics: "配送與售後客服"
};
const CATEGORY_ORDER = ["account", "marketing", "finance", "logistics"];

let faqData = JSON.parse(document.getElementById('faq-data').textContent);
let activeCategory = "all";
let openCardIds = new Set();
let isEditMode = false;

// ============ 文字處理 ============
function escapeHtml(str){
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// 將文字中的網址轉成可點擊連結，並保留換行
function linkifyContent(text){
  const escaped = escapeHtml(text);
  const urlRegex = /(https?:\/\/[^\s）)]+)/g;
  return escaped.replace(urlRegex, (url) => `<a href="${url}" target="_blank" rel="noopener">${url}</a>`);
}

function highlightMatch(text, query){
  if(!query) return escapeHtml(text);
  const escaped = escapeHtml(text);
  const escapedQuery = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  const re = new RegExp(`(${escapedQuery})`, 'gi');
  return escaped.replace(re, '<mark style="background:#fde9a8;border-radius:3px;padding:0 1px;">$1</mark>');
}

// ============ 篩選 / 搜尋 ============
function matchesSearch(item, query){
  if(!query) return true;
  const q = query.toLowerCase();
  const haystack = (item.title + ' ' + item.content + ' ' + (item.tags||[]).join(' ')).toLowerCase();
  return haystack.includes(q);
}

function getFilteredItems(){
  const query = document.getElementById('searchInput').value.trim();
  return faqData.filter(item => {
    const catMatch = activeCategory === 'all' || item.category === activeCategory;
    return catMatch && matchesSearch(item, query);
  });
}

// ============ Render: Tabs ============
function renderTabs(){
  const tabsEl = document.getElementById('tabs');
  const counts = {};
  faqData.forEach(it => counts[it.category] = (counts[it.category]||0) + 1);
  const total = faqData.length;

  let html = `<div class="tab ${activeCategory==='all'?'active':''}" onclick="setCategory('all')">全部 <span class="count">${total}</span></div>`;
  CATEGORY_ORDER.forEach(cat => {
    if(!counts[cat]) return;
    html += `<div class="tab ${activeCategory===cat?'active':''}" onclick="setCategory('${cat}')">${CATEGORY_LABELS[cat]} <span class="count">${counts[cat]||0}</span></div>`;
  });
  tabsEl.innerHTML = html;
}

}

  const tagsHtml = (item.tags||[]).map(t => `<span class="card-tag">${escapeHtml(t)}</span>`).join('');

  return `
  <div class="card ${isOpen?'open':''}" data-id="${item.id}">
    <div class="card-head" onclick="toggleCard('${item.id}')">
      <div class="card-title">${highlightMatch(item.title, query)}</div>
      <div class="card-meta">
        ${shotBadge}
        <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
    </div>
    <div class="card-body">
      <div class="card-content">${linkifyContent(item.content)}</div>
      ${screenshotLink}
      <div class="card-tags">${tagsHtml}</div>
    </div>
  </div>`;
}

function cardEditHtml(item){
  const tagsStr = (item.tags||[]).join(', ');
  return `
  <div class="card open" data-id="${item.id}">
    <div class="card-head">
      <input class="card-title-input" value="${escapeHtml(item.title)}" data-field="title" data-id="${item.id}">
    </div>
    <div class="card-body" style="display:block;">
      <textarea class="card-content-input" data-field="content" data-id="${item.id}">${escapeHtml(item.content)}</textarea>
      <div style="margin-top:10px;">
        <label style="font-size:11.5px;color:var(--ink-soft);font-weight:600;">標籤（逗號分隔）</label>
        <input type="text" class="card-title-input" style="margin-top:4px;font-size:12.5px;font-weight:500;" value="${escapeHtml(tagsStr)}" data-field="tags" data-id="${item.id}">
      </div>
      <div class="edit-toolbar">
        <button class="save-btn" onclick="saveCardEdits('${item.id}')">儲存這筆修改</button>
        <button class="delete-btn" onclick="deleteCard('${item.id}')">刪除這筆問答</button>
      </div>
    </div>
  </div>`;
}

function renderAll(){
  renderTabs();
  const main = document.getElementById('main');
  const query = document.getElementById('searchInput').value.trim();
  const filtered = getFilteredItems();

  document.getElementById('searchCount').textContent = query
    ? `找到 ${filtered.length} 筆符合「${query}」的結果`
    : '';

  let html = '';
  if(activeCategory === 'all' && !query){
    html += renderRefBlock();
  }

  if(filtered.length === 0){
    html += `<div class="empty-state"><div class="icon">🔍</div>找不到符合的問題，換個關鍵字試試？</div>`;
  } else {
    // group by category in CATEGORY_ORDER
    CATEGORY_ORDER.forEach(cat => {
      const items = filtered.filter(it => it.category === cat);
      if(items.length === 0) return;
      html += `<div class="category-section">`;
      if(activeCategory === 'all'){
        html += `<div class="category-title">${CATEGORY_LABELS[cat]}</div>`;
      }
      items.forEach(item => {
        html += isEditMode ? cardEditHtml(item) : cardViewHtml(item, query);
      });
      html += `</div>`;
    });
  }

  if(isEditMode){
    html += `
    <div class="add-card-wrap">
      <button class="add-card-btn" onclick="openAddModal()">+ 新增一筆問答</button>
    </div>`;
  }

  main.innerHTML = html;

  // restore base64 images placeholders only once at first render via global replace (see init)
}

function scrollToRef(id){
  if(activeCategory !== 'all' || document.getElementById('searchInput').value.trim()){
    activeCategory = 'all';
    document.getElementById('searchInput').value = '';
    renderAll();
  }
  setTimeout(() => {
    const el = document.getElementById(id);
    if(el){
      el.scrollIntoView({behavior:'smooth', block:'center'});
      el.style.transition = 'box-shadow .3s ease';
      el.style.boxShadow = '0 0 0 3px rgba(191,0,0,0.4)';
      setTimeout(() => { el.style.boxShadow = 'none'; }, 1200);
    }
  }, 50);
}

function toggleCard(id){
  if(openCardIds.has(id)){
    openCardIds.delete(id);
  } else {
    openCardIds.add(id);
  }
  renderAll();
}

// ============ Lightbox ============
function openLightbox(src){
  document.getElementById('lightboxImg').src = src;
  document.getElementById('lightbox').classList.add('show');
}
function closeLightbox(){
  document.getElementById('lightbox').classList.remove('show');
}

// ============ Edit mode ============
function toggleEditMode(){
  isEditMode = !isEditMode;
  document.body.classList.toggle('edit-mode', isEditMode);
  const btn = document.getElementById('editToggle');
  btn.textContent = isEditMode ? '✓ 結束編輯模式' : '✎ 開啟編輯模式';
  document.getElementById('exportBtn').style.display = isEditMode ? 'inline-block' : 'none';
  document.getElementById('addBtn').style.display = isEditMode ? 'inline-block' : 'none';
  renderAll();
}

function saveCardEdits(id){
  const item = faqData.find(it => it.id === id);
  if(!item) return;
  const titleInput = document.querySelector(`[data-id="${id}"][data-field="title"]`);
  const contentInput = document.querySelector(`[data-id="${id}"][data-field="content"]`);
  const tagsInput = document.querySelector(`[data-id="${id}"][data-field="tags"]`);
  item.title = titleInput.value.trim();
  item.content = contentInput.value.trim();
  item.tags = tagsInput.value.split(',').map(s => s.trim()).filter(Boolean);
  flashSaved(id);
}

function flashSaved(id){
  const card = document.querySelector(`.card[data-id="${id}"]`);
  if(!card) return;
  card.style.transition = 'background .2s ease';
  card.style.background = '#eafaf0';
  setTimeout(() => { card.style.background = ''; }, 700);
}

function deleteCard(id){
  if(!confirm('確定要刪除這筆問答嗎？此動作只影響目前畫面，記得稍後要匯出存檔。')) return;
  faqData = faqData.filter(it => it.id !== id);
  renderAll();
}

// ============ Add new item ============
function openAddModal(){
  document.getElementById('newTitle').value = '';
  document.getElementById('newContent').value = '';
  document.getElementById('newTags').value = '';
  document.getElementById('addModal').classList.add('show');
}
function closeAddModal(){
  document.getElementById('addModal').classList.remove('show');
}
function confirmAdd(){
  const category = document.getElementById('newCategory').value;
  const title = document.getElementById('newTitle').value.trim();
  const content = document.getElementById('newContent').value.trim();
  const tags = document.getElementById('newTags').value.split(',').map(s=>s.trim()).filter(Boolean);

  if(!title || !content){
    alert('請填寫問題標題與回覆內容');
    return;
  }

  const newId = category.slice(0,3) + '-' + Date.now().toString(36);
  faqData.push({
    id: newId,
    category: category,
    title: title,
    content: content,
    tags: tags,
    has_screenshot: null
  });

  closeAddModal();
  activeCategory = category;
  renderAll();
}

// ============ Export ============
function exportHtml(){
  // 匯出前先記錄目前狀態，並重置畫面到「全部收合、非編輯模式」再複製，
  // 避免 cloneNode 把當前展開狀態的多餘 DOM 內容也存進去，讓檔案越改越肥大。
  const wasEditMode = isEditMode;
  const savedOpenIds = new Set(openCardIds);
  const savedCategory = activeCategory;
  const savedSearch = document.getElementById('searchInput').value;

  isEditMode = false;
  openCardIds = new Set();
  activeCategory = 'all';
  document.getElementById('searchInput').value = '';
  document.body.classList.remove('edit-mode');
  document.getElementById('editToggle').textContent = '✎ 開啟編輯模式';
  document.getElementById('exportBtn').style.display = 'none';
  document.getElementById('addBtn').style.display = 'none';
  renderAll();

  // 把最新的 faqData 寫回真正的 <script id="faq-data"> 節點
  const dataEl = document.getElementById('faq-data');
  dataEl.textContent = JSON.stringify(faqData, null, 2);

  // 複製整個 <html> 節點作為匯出內容
  const clonedHtml = document.documentElement.cloneNode(true);
  // 清空複製品裡 #main 和 #tabs 的內容：這些都是 renderAll() 動態產生的 DOM，
  // 開啟匯出後的檔案時 JS 會自動重新渲染，不需要把目前渲染結果也序列化進去，
  // 否則圖片 base64 等內容會重複存在兩份，讓檔案越改越肥大。
  const clonedMain = clonedHtml.querySelector('#main');
  if(clonedMain) clonedMain.innerHTML = '';
  const clonedTabs = clonedHtml.querySelector('#tabs');
  if(clonedTabs) clonedTabs.innerHTML = '';
  const clonedSearchCount = clonedHtml.querySelector('#searchCount');
  if(clonedSearchCount) clonedSearchCount.textContent = '';
  const updatedHtml = '<!DOCTYPE html>\n' + clonedHtml.outerHTML;

  // 還原畫面到使用者操作前的狀態
  isEditMode = wasEditMode;
  openCardIds = savedOpenIds;
  activeCategory = savedCategory;
  document.getElementById('searchInput').value = savedSearch;
  document.body.classList.toggle('edit-mode', isEditMode);
  document.getElementById('editToggle').textContent = isEditMode ? '✓ 結束編輯模式' : '✎ 開啟編輯模式';
  document.getElementById('exportBtn').style.display = isEditMode ? 'inline-block' : 'none';
  document.getElementById('addBtn').style.display = isEditMode ? 'inline-block' : 'none';
  renderAll();

  const blob = new Blob([updatedHtml], {type: 'text/html;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const ts = new Date().toISOString().slice(0,10);
  a.href = url;
  a.download = `店家客服FAQ知識庫_${ts}.html`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

// ============ Keyboard ============
document.addEventListener('keydown', (e) => {
  if(e.key === 'Escape'){
    closeLightbox();
    closeAddModal();
  }
});

// ============ Init ============
renderAll();

</script>
